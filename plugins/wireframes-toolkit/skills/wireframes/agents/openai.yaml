interface:
  display_name: "Wireframes"
  short_description: "Create reference-backed adaptive wireframes"
  default_prompt: "Use $wireframes to research relevant layouts and create editable black-and-white Figma wireframes with icons, adaptive components, and cross-screen consistency."
dependencies:
  tools:
    - type: "mcp"
      value: "figma"
      description: "Figma MCP server for editable wireframes"
      transport: "streamable_http"
      url: "https://mcp.figma.com/mcp"
policy:
  allow_implicit_invocation: true
